# Blueprint de Render. Al conectar el repositorio, Render lee este archivo.
# (También puedes crear el servicio a mano siguiendo DEPLOY-render.md.)
services:
  - type: web
    name: motoskike
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn passenger_wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: AES_KEY
        sync: false        # pégala tú (python gen_keys.py)
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD_HASH
        sync: false        # pégala tú (python gen_keys.py)
      - key: DATABASE_URL
        sync: false        # cadena de conexión PostgreSQL (Neon/Render)
      - key: SMTP_HOST
        value: ssl0.ovh.net
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USE_SSL
        value: "true"
      - key: SMTP_USE_TLS
        value: "false"
      - key: SMTP_USER
        value: info@motoskike.es
      - key: SMTP_PASSWORD
        sync: false        # pégala tú
      - key: SMTP_FROM
        value: Motos Kike <info@motoskike.es>
