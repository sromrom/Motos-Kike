{% extends "admin/base_admin.html" %}
{% set active='used' %}
{% block content %}
<h1>Motos de ocasión</h1>
<div class="grid g2">
  <div class="panel">
    <h3>Añadir / editar</h3>
    <form method="post">
      <input type="hidden" name="id" id="u_id">
      <div class="field"><label>Título *</label><input name="title" id="u_title" required></div>
      <div class="row2">
        <div class="field"><label>Marca</label><input name="brand" id="u_brand"></div>
        <div class="field"><label>Año</label><input name="year" id="u_year"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Km</label><input name="km" id="u_km"></div>
        <div class="field"><label>Cilindrada</label><input name="cc" id="u_cc"></div>
      </div>
      <div class="field"><label>Precio</label><input name="price" id="u_price" placeholder="2.500 €"></div>
      <div class="field"><label>Descripción</label><textarea name="description" id="u_desc"></textarea></div>
      <div class="field"><label>Imágenes (URLs separadas por coma)</label><textarea name="images" id="u_img"></textarea>
        <input type="file" accept="image/*" onchange="uploadImg(this,'u_img')" style="margin-top:6px"></div>
      <div class="row2">
        <div class="field"><label>Vendida</label><br><input type="checkbox" name="sold" id="u_sold" style="width:auto"></div>
        <div class="field"><label>Visible</label><br><input type="checkbox" name="visible" id="u_vis" checked style="width:auto"></div>
      </div>
      <button class="btn primary wide">Guardar</button>
    </form>
  </div>
  <div class="panel"><h3>Listado</h3>
    <table><tr><th>Moto</th><th>Precio</th><th>Estado</th><th></th></tr>
    {% for u in bikes %}
    <tr><td>{{ u.title }}</td><td>{{ u.price }}</td><td>{{ 'Vendida' if u.sold else 'Disponible' }}</td><td>
      <button class="btn sm ghost" onclick='editU({{u.id}},{{u.title|tojson}},{{u.brand|tojson}},{{u.year|tojson}},{{u.km|tojson}},{{u.cc|tojson}},{{u.price|tojson}},{{u.description|tojson}},{{u.images|tojson}},{{u.sold|tojson}},{{u.visible|tojson}})'>Editar</button>
      <form method="post" action="{{ url_for('admin_used_delete', uid=u.id) }}" style="display:inline" onsubmit="return confirm('¿Eliminar?')"><button class="btn sm danger">X</button></form>
    </td></tr>
    {% endfor %}</table>
  </div>
</div>
<script>
function editU(id,t,b,y,km,cc,p,d,img,sold,vis){u_id.value=id;u_title.value=t;u_brand.value=b;u_year.value=y;u_km.value=km;u_cc.value=cc;u_price.value=p;u_desc.value=d;u_img.value=img;u_sold.checked=sold;u_vis.checked=vis;window.scrollTo(0,0);}
</script>
{% endblock %}
