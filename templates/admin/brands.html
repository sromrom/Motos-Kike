{% extends "admin/base_admin.html" %}
{% set active='brands' %}
{% block content %}
<h1>Marcas / proveedores</h1>
<div class="grid g2">
  <div class="panel">
    <h3>Añadir / editar</h3>
    <form method="post">
      <input type="hidden" name="id" id="b_id">
      <div class="field"><label>Nombre *</label><input name="name" id="b_name" required></div>
      <div class="field"><label>Logo (URL)</label><input name="logo_url" id="b_logo">
        <input type="file" accept="image/*" onchange="uploadImg(this,'b_logo')" style="margin-top:6px"></div>
      <div class="field"><label>Web oficial</label><input name="website" id="b_web"></div>
      <div class="row2">
        <div class="field"><label>Orden</label><input name="order" id="b_order" type="number" value="0"></div>
        <div class="field"><label>Visible</label><br><input type="checkbox" name="visible" id="b_vis" checked style="width:auto"></div>
      </div>
      <button class="btn primary wide">Guardar</button>
    </form>
  </div>
  <div class="panel">
    <h3>Listado</h3>
    <table><tr><th>Marca</th><th>Visible</th><th></th></tr>
    {% for b in brands %}
    <tr><td>{{ b.name }}</td><td>{{ '✅' if b.visible else '🚫' }}</td><td>
      <button class="btn sm ghost" onclick='editB({{ b.id }},{{ b.name|tojson }},{{ b.logo_url|tojson }},{{ b.website|tojson }},{{ b.order }},{{ b.visible|tojson }})'>Editar</button>
      <form method="post" action="{{ url_for('admin_brand_delete', bid=b.id) }}" style="display:inline" onsubmit="return confirm('¿Eliminar?')"><button class="btn sm danger">X</button></form>
    </td></tr>
    {% endfor %}
    </table>
  </div>
</div>
<script>
function editB(id,name,logo,web,order,vis){
  b_id.value=id;b_name.value=name;b_logo.value=logo;b_web.value=web;b_order.value=order;b_vis.checked=vis;
  window.scrollTo(0,0);
}
</script>
{% endblock %}
